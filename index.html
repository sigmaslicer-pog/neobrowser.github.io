<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD MODE Browser OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">⚡ GOD MODE OS</div>

  <input id="search" placeholder="Search everything..." />
  <button onclick="search()">Search</button>
  <button onclick="newTab()">+ Tab</button>
</div>

<!-- TABS -->
<div id="tabBar" class="tabBar"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="openApp('home')">Home</button>
    <button onclick="openApp('ai')">AI</button>
    <button onclick="openApp('apps')">Apps</button>
    <button onclick="openApp('calc')">Calculator</button>
    <button onclick="openApp('game')">Game</button>
    <button onclick="openApp('history')">History</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="home" class="panel active">
      <h2>Search Results</h2>
      <div id="results"></div>
    </div>

    <div id="ai" class="panel">
      <h2>AI Core</h2>
      <textarea id="aiInput"></textarea>
      <button onclick="askAI()">Run AI</button>
      <div id="aiOut"></div>
    </div>

    <div id="apps" class="panel">
      <h2>Apps (200+ system)</h2>
      <div id="appsGrid"></div>
    </div>

    <div id="calc" class="panel">
      <h2>Calculator</h2>
      <input id="calcDisplay" readonly />
      <div id="calcPad"></div>
    </div>

    <div id="game" class="panel">
      <h2>Offline Game</h2>
      <button onclick="clickGame()" class="big">CLICK</button>
      <p>Score: <span id="score">0</span></p>
    </div>

    <div id="history" class="panel">
      <h2>Search History</h2>
      <div id="historyBox"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
