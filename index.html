<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL BOSS OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🧠 FINAL BOSS OS</div>

  <input id="urlBar" placeholder="Search or enter query..." />
  <button onclick="go()">GO</button>
  <button onclick="newTab()">+ TAB</button>
</div>

<!-- TAB BAR -->
<div id="tabs"></div>

<!-- MAIN -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="openApp('home')">Browser</button>
    <button onclick="openApp('ai')">AI Brain</button>
    <button onclick="openApp('apps')">Apps</button>
    <button onclick="openApp('bookmarks')">Bookmarks</button>
    <button onclick="openApp('history')">History</button>
    <button onclick="openApp('game')">Offline Mode</button>
  </div>

  <!-- CONTENT -->
  <div class="main">

    <!-- BROWSER -->
    <div id="home" class="panel active">
      <h2>Web Results</h2>
      <div id="results"></div>
    </div>

    <!-- AI -->
    <div id="ai" class="panel">
      <h2>AI Brain</h2>
      <textarea id="aiInput"></textarea>
      <button onclick="askAI()">Ask Brain</button>
      <div id="aiOut"></div>
    </div>

    <!-- APPS -->
    <div id="apps" class="panel">
      <h2>App Universe</h2>
      <div id="appsGrid"></div>
    </div>

    <!-- BOOKMARKS -->
    <div id="bookmarks" class="panel">
      <h2>Bookmarks</h2>
      <div id="bookmarkList"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="panel">
      <h2>History</h2>
      <div id="historyList"></div>
    </div>

    <!-- GAME -->
    <div id="game" class="panel">
      <h2>Offline Survival Mode</h2>
      <button onclick="clicker()" class="big">CLICK</button>
      <p>Score: <span id="score">0</span></p>
    </div>

  </div>
</div>

<script src="apps.js"></script>
<script src="plugins.js"></script>
<script src="core.js"></script>

</body>
</html>
